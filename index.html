<!DOCTYPE html>
<html>
<head>
  <title>Downloading...</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
      background-color: #f5f7fa;
    }
    h1 {
      color: #333;
    }
    #countdown {
      font-size: 28px;
      color: #007BFF;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>The file will start downloading in <span id="countdown">5</span> seconds</h1>
  <p>Please wait...</p>

  <script>
    let timeLeft = 5;

    const countdownElement = document.getElementById("countdown");

    const timer = setInterval(function() {
      timeLeft--;
      countdownElement.textContent = timeLeft;

      if (timeLeft <= 0) {
        clearInterval(timer);

        // Start download
        window.location.href = "https://drive.google.com/uc?export=download&id=1f9Pwej13vmu39SxwpohncRWBr8B03zKM";

        // Redirect after 2 seconds
        setTimeout(function() {
          window.location.href = "https://rpcc.gov.bd/pages/static-pages/6922e05a933eb65569e26a44";
        }, 2000);
      }
    }, 1000);
  </script>

</body>
</html>
